<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tao Helbert | Contact</title>
    <link rel="stylesheet" href="asset/css/normalize.css">
    <link rel="stylesheet" href="asset/css/style.css">
</head>
<body class="page-contact">

    <header class="main-header">
        <div class="container">
            <nav>
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="a-propos.html">A propos</a></li>
                    <li><a href="projet.html">Projets</a></li>
                    <li><a href="veille.html">Veille</a></li>
                    <li class="contact-item"><a href="contact.html"><strong>Me contacter</strong></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1>Me contacter</h1>
        <p>Pour me contacter, remplissez le formulaire ci-dessous.</p>

            <form
            id="contact-form"
            action="https://formspree.io/f/xdawjplk"
            method="POST"
            >
                <label for="name">Nom :</label>
                <input type="text" id="name" name="name" required>
                <br>
                <label for="email">Email :</label>
                <input type="email" id="email" name="email" required>
                <br>
                <label for="message">Message :</label>
                <textarea id="message" name="message" required></textarea>
                <br>
                
                <div class="checkbox-rgpd">
                    <input type="checkbox" id="consentement" name="consentement" required>
                    <label for="consentement">J'accepte que mes données saisies dans ce formulaire soient utilisées pour me recontacter. <a href="mentions-legales.html">En savoir plus</a>.</label>
                </div>
                <input type="submit" value="Envoyer">
            </form>

        <div id="success-message" class="success-msg" style="display: none;">
            Votre message a bien été envoyé. Une réponse vous sera apporté au plus vite.
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="asset/js/include.js"></script>
    <script src="asset/js/script.js"></script>
    
</body>
</html>
